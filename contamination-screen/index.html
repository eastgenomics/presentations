# Contamination Screen

### Pairwise cross-sample contamination detection for tumour panel VCFs

CUH Bioinformatics — Uranus Pipeline

-----

## The problem

- Haem-onc panel sequencing: 46 samples per run
- Contamination introduces variants from one patient into another
- This can lead to **false somatic variant calls** 

---

## What does contamination look like?

Source patient's **germline heterozygous SNPs** (~50% VAF) appear in the recipient at a diluted fraction:

$$\text{VAF}_{\text{recipient}} \approx \text{VAF}_{\text{source}} \times \text{contamination fraction}$$

At 50% contamination: source variants at 50% appear at ~25% in recipient

---

## The key insight

If many shared variants between two samples all show the **same VAF ratio**, that's contamination — not random noise.

**Random sharing:** scattered ratios (no pattern)

**Contamination:** sharp peak at one ratio

-----

## Detection method

### Log2-ratio histogram

For each pair of samples:
1. Find all shared variants (same CHROM, POS, REF, ALT)
2. Compute `log2(VAF_B / VAF_A)` for each
3. Histogram the log2 ratios
4. Look for a **peak** (cluster of variants at one ratio)

---

## Why log2 scale?

- Symmetrises the ratio: 2:1 forward = +1, reverse = −1
- Contamination at any fraction produces a distinct peak
- Visually intuitive

| Contamination | Ratio | log2 |
|---|---|---|
| 50% | 0.50 | −1.0 |
| 25% | 0.25 | −2.0 |
| 10% | 0.10 | −3.3 |

---

## Dual-peak detection

Two unrelated people share common germline SNPs at similar VAF (both het → ratio ≈ 1)

**Problem:** this cluster at ratio=1 could mask contamination

**Solution:** report TWO peaks:
1. **Overall peak** — tallest bin (usually ratio=1, germline sharing)
2. **Non-unity peak** — tallest bin where |log2| > 0.3 (contamination signal)

Flagging is based on the **non-unity peak** only

-----

## Pre-filtering

### What we keep

| Filter | Threshold | Why |
|---|---|---|
| PASS | Sentieon TNfilter | Remove soft-filtered artefacts |
| Depth | DP ≥ 99 | Reliable VAF estimation |
| VAF | AF ≥ 0.03 | Minimum reliable allele fraction |
| gnomAD | AF < 0.40 | Remove hom/het artefact (next slide) |

-----

## Threshold validation

### gnomAD ≥ 0.40

---

## The hom/het artefact

At gnomAD AF > 0.40:
- Many people are **hom-alt** (AF ≈ 1.0)
- Others are **het** (AF ≈ 0.5)

When paired:

$$\frac{AF_{\text{het}}}{AF_{\text{hom}}} = \frac{0.5}{1.0} = 0.5 \quad (\text{log2} = -1.0)$$

This **exactly mimics 50% contamination**!

---

## Empirical validation

Tested on uncontaminated pairs (B vs C, C vs A):

**All 15 false-positive markers** had gnomAD AF > 0.40

| gnomAD AF | False markers | Real markers |
|---|---|---|
| 0.43 – 0.81 | 15/15 | 1/18 |
| < 0.40 | 0/15 | 17/18 |

**gnomAD ≥ 0.40 removes 100% of false positives while keeping 94% of real signal**

---

## Why not lower?

At gnomAD 0.26–0.30 (below threshold):
- Linked germline SNPs (e.g. 5 PRPF8 variants on same haplotype)
- One person hom-alt, other het → false cluster of 4–5

But peak_count threshold of 6 absorbs this (see next section)

-----

## Threshold validation

### peak_count ≥ 6

---

## The null model

Under no contamination, non-unity variants are scattered **randomly** across 37 histogram bins.

Question: what's the probability that the tallest bin reaches N by chance?

Model: maximum of a multinomial distribution
- ~20 non-unity variants per pair (empirical)
- 37 bins (each 0.2 log2 units, excluding ±0.3 unity zone)

---

## Monte Carlo results

100,000 simulations, 20 variants across 37 bins:

| Threshold | P(exceed) per pair | Expected FP in 1128 pairs |
|---|---|---|
| ≥ 4 | 0.035 | **39.5** |
| ≥ 5 | 0.006 | **6.8** |
| **≥ 6** | **0.0004** | **< 1** |
| ≥ 7 | 0.00001 | ~0 |
| ≥ 8 | ~0 | ~0 |

**peak_count ≥ 6** gives < 1 expected false positive for 48-sample cohorts

---

## Linkage disequilibrium safety margin

Linked SNPs on the same haplotype are **not independent** — they produce correlated clusters:

- 5 PRPF8 variants at log2 = 1.65–1.82 (one haplotype block)
- 2 SRCAP variants at log2 = 1.55–1.71

These produce peak_count = 4–5, **below the threshold of 6**

The threshold absorbs linkage artefacts naturally.

-----

## Threshold validation

### Unity zone boundary (|log2| ≤ 0.3)

---

## Derivation from measurement noise

For germline het variant (AF ≈ 0.5) at depth D:

$$SE(\log_2 ratio) \approx \frac{\sqrt{2} \cdot \sqrt{0.25/D}}{0.5 \cdot \ln 2}$$

| Depth | SE(log2) | 3σ range |
|---|---|---|
| 99 (minimum) | 0.205 | ±0.615 |
| 1000 (typical) | 0.065 | ±0.194 |

At DP ≥ 99: threshold of 0.3 captures ±1.5σ of noise

---

## Empirical validation

Germline variants in the unity zone (known shared hets):

- **Mean log2_ratio:** 0.006 (essentially zero)
- **SD:** 0.09
- **Range:** −0.16 to +0.25

All within ±0.3 boundary ✓

---

## Detection range

| Contamination fraction | Detectable? |
|---|---|
| 0–81% | ✓ Non-unity peak |
| 81–100% | Via overall peak (near-swap) |

The dual-peak design ensures nothing is missed.

-----

## Performance testing

### 3-sample validation set

---

## Known ground truth

Three patients on same sequencing run, plate-adjacent:

- **A** (26098K0076) at position B4
- **B** (26093K0005) at position A4 — FREEMIX = 45.5%
- **C** (26097K0043) at position C2 — clean

Known: A contaminated B at ~50% (plate-adjacent, confirmed by VerifyBamID)

---

## Results

| Pair | Status | n_shared | Peak count | Flagged |
|---|---|---|---|---|
| **A → B** | Contaminated | 57 | **17** | **Yes** ✓ |
| B vs C | Clean | 31 | 5 | No ✓ |
| C vs A | Clean | 25 | 4 | No ✓ |

- ✅ Contaminated pair detected (peak_count=17, ratio=2:1)
- ✅ Clean pairs not flagged (peak_count=4–5 from linkage)
- ✅ Direction correctly identified (A → B)
- ✅ Fraction correctly estimated (~50%)

-----

## Performance testing

### 46-sample cohort

---

## Cohort run (peak_count ≥ 8)

| Metric | Value |
|---|---|
| Samples | 46 |
| Pairs assessed | 990 |
| Pairs flagged | 19 |
| Primary event confirmed | 26098K0076 (B4) → 26093K0005 (A4) |

---

## Corroboration with independent QC

| Evidence | 26093K0005 (recipient) | 26098K0076 (source) |
|---|---|---|
| Plate position | **A4** | **B4 (adjacent!)** |
| VerifyBamID FREEMIX | **45.5%** | **13.9%** |
| Median coverage | **451x** (lowest) | 1212x |
| Our tool peak_count | Recipient, n=17 | Source |

All four independent lines of evidence agree.

---

## Transitive contamination

26093K0005 flagged as recipient in **13 of 19** pairs

Not 13 independent events — **one heavily contaminated sample** creates transitive signals:

1. 26098K0076 contaminates 26093K0005 at ~50%
2. 26093K0005 now carries 26098K0076's variants at ~25% VAF
3. Any other sample het for those variants → ratio 2:1 with 26093K0005

**Diagnostic:** one recipient, many "sources", all same fraction

---

## Other confirmed events

| Source → Recipient | Positions | Adjacent? | peak_count |
|---|---|---|---|
| 26098K0076 → 26093K0005 | B4 → A4 | **Yes** | 17 |
| 26089K0042 → 26092K0050 | E1 → E2 | **Yes** | 8 |
| 26092K0050 → 26097K0043 | E2 → C2 | Same column | 10 |

Physical adjacency confirmed for top events.

-----

## The pipeline

```bash
bcftools view -f PASS input.vcf.gz -Ou \
| bcftools filter -e '(FORMAT/DP<99 || AF<0.03)' -Ou \
| bcftools +split-vep --columns - -a CSQ -p CSQ_ -s worst -Ou \
| bcftools view -e 'CSQ_gnomADg_AF>=0.40 || CSQ_gnomADe_AF>=0.40' \
    -Oz -o out.vcf.gz
```

4 piped bcftools commands → filtered VCF per sample

Then: pairwise comparison in Python (pandas + numpy)

---

## Usage

```bash
python contamination_screen.py /data/vcfs/ \
    --plate-layout multiqc_general_stats.txt \
    --outdir results/ \
    --plots
```

Outputs: summary.tsv, matrix.tsv, flagged_pairs/*.tsv, plots/*.png

---

## Outputs

- **summary.tsv** — one row per pair, dual-peak results, flagging
- **matrix.tsv** — N×N directional matrix (ordered by plate position)
- **flagged_pairs/*.tsv** — per-variant detail for top flagged pairs
- **plots/*.png** — log2-ratio histograms

-----

## Summary of design choices

| Choice | Rationale |
|---|---|
| No gnomAD/synonymous/Prev_Count filter | Contamination IS germline variants |
| gnomAD ≥ 0.40 only | Removes hom/het artefact; validated empirically |
| Dual-peak (unity + non-unity) | Separates germline sharing from contamination |
| peak_count ≥ 6 | Derived from multinomial null; <1 FP per cohort |
| Unity zone ±0.3 log2 | Derived from binomial noise at DP ≥ 99 |
| Plate-ordered matrix | Makes adjacent-well patterns visible |

---

## Key lessons learned

1. **The hom/het artefact at gnomAD > 0.40** produces exact mimics of 50% contamination — must be filtered
2. **Linkage disequilibrium** creates false clusters of 4–5 — threshold must be above this
3. **Transitive contamination** from heavily-contaminated samples creates many false flags — pattern recognition needed
